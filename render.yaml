services:
  - type: web
    name: hoffmann-pdf-extractor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CATALOG_PATH
        value: data/catalog.xlsx
      - key: CLIENTS_PATH
        value: data/clients.xlsx
